name: Playwright Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.55.0-noble
      options: --user 1001

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Browsers
        run: uv run playwright install chromium

      - name: Lint Code
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: xvfb-run uv run pytest --headed
        continue-on-error: true

      - name: Debug generated files
        if: always()
        run: |
          echo "===== REPORTS ====="
          ls -R reports || true
          echo "===== TEST RESULTS ====="
          ls -R test-results || true

      - name: Upload HTML and Allure Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright Failure Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: reports/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fail workflow if tests failed
        if: always()
        run: |
          if grep -q 'failures="0"' reports/results.xml && grep -q 'errors="0"' reports/results.xml; then
            echo "All tests passed"
          else
            echo "Tests failed"
            exit 1
          fi